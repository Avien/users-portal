<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Users Portal</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <h1>Users Portal</h1>
      <p class="subtitle">Choose your experience</p>
      <div class="cards">
        <button class="card" data-mode="angular">
          <span class="card__badge card__badge--angular">Angular</span>
          <span class="card__title">Full Angular</span>
          <span class="card__desc">NgRx · Signals · OnPush</span>
        </button>
        <button class="card" data-mode="react">
          <span class="card__badge card__badge--react">React</span>
          <span class="card__title">Full React</span>
          <span class="card__desc">TanStack Query · Zustand</span>
        </button>
        <button class="card" data-mode="hybrid">
          <span class="card__badge card__badge--hybrid">Hybrid</span>
          <span class="card__title">Hybrid</span>
          <span class="card__desc">Angular shell · React remote</span>
        </button>
      </div>
    </main>
    <script src="app.js"></script>
  </body>
</html>
