<div class="orders-card">
  <h2>Orders</h2>

  @if (error()) {
    <p class="error-state">{{ error() }}</p>
  } @else if (loading()) {
    <p class="loading-state">Loading orders...</p>
  } @else if (orders().length) {
    <cdk-virtual-scroll-viewport
      class="orders-viewport"
      role="list"
      aria-label="Orders"
      [itemSize]="ordersVirtualRowHeightPx"
      minBufferPx="200"
      maxBufferPx="480"
    >
      <div
        *cdkVirtualFor="let order of orders(); trackBy: trackByOrderId"
        class="orders-row"
        role="listitem"
      >
        <span>#{{ order.id }}</span>
        <strong>{{ order.total | number: '1.2-2' }}</strong>
      </div>
    </cdk-virtual-scroll-viewport>
  } @else if (loaded()) {
    <p>No orders for this user.</p>
  }
</div>
