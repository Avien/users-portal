@if ($vm(); as vm) {
  <fmr-toast-stack
    [notifications]="vm.notifications"
    (dismissed)="dismissOrderNotification($event)"
  />
  <section class="shell">
    <header class="page-header">
      <h1>Users orders dashboard</h1>

      <div class="subtitle-row">
        <p>Facade-driven example with NgRx entity, selectors and signals.</p>

        <span
          class="spinner"
          [class.hidden]="!vm.loading"
          aria-label="Loading"
        ></span>
      </div>
    </header>

    @if (vm.error) {
      <p class="error-state">{{ vm.error }}</p>
    }

    <fmr-user-buttons
      [users]="vm.users"
      [selectedUserId]="vm.selectedUserId"
      (userSelected)="selectUser($event)"
    />

    @if (vm.selectedUserSummary; as summary) {
      <div class="summary-grid">
        <fmr-user-name [userName]="summary.userName" />
        <fmr-user-total-orders [totalAmount]="summary.totalAmount" />
      </div>

      <fmr-orders-card
        [orders]="vm.orders"
        [loading]="vm.loading"
        [loaded]="vm.loaded"
        [error]="vm.error"
      />
    } @else if (!vm.loading && vm.loaded) {
      <p class="empty-state">Select a user</p>
    }
  </section>
}
